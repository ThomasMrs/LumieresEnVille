<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console - Lumières en Ville</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Lumières en Ville - Console d'Administration</h1>
    </header>

    <main>
        <div class="col-forms">
            <section>
                <h2>1. Configuration Globale</h2>
                <form action="/ihm/add_config" method="get">
                    <label>Largeur (X) <input type="number" name="nombre_x" required></label>
                    <label>Hauteur (Y) <input type="number" name="nombre_y" required></label>
                    <label>Sémaphores <input type="number" name="nombre_semaphore" required></label>
                    <label>Robots <input type="number" name="nombre_robot" required></label>
                    <button type="submit">Configurer</button>
                </form>
            </section>

            <section>
                <h2>2. Déployer une entité</h2>
                <form action="/ihm/add_semaphore" method="get" style="margin-bottom: 15px;">
                    <label>Nom Sémaphore <input type="text" name="name" required></label>
                    <label>Durée <input type="number" name="duration" required></label>
                    <label>Type <input type="text" name="type" required></label>
                    <label>Coord X <input type="number" name="coord_x" required></label>
                    <label>Coord Y <input type="number" name="coord_y" required></label>
                    <button type="submit">Ajouter Sémaphore</button>
                </form>
                <form action="/ihm/add_robot" method="get">
                    <label>Nom Robot <input type="text" name="name"></label>
                    <label>Vitesse <input type="number" name="speed"></label>
                    <label>Position X <input type="number" name="position_x"></label>
                    <label>Position Y <input type="number" name="position_y"></label>
                    <button type="submit">Ajouter Robot</button>
                </form>
            </section>

            <section>
                <h2>3. Règles et Systèmes</h2>
                <form action="/ihm/add_team" method="get" style="margin-bottom: 15px;">
                    <label>Nom Équipe <input type="text" name="name" required></label>
                    <label>IP Console <input type="text" name="ip"></label>
                    <label>Autorisée ? <input type="checkbox" name="allowed" value="true" style="width:auto;"></label>
                    <button type="submit">Autoriser Console</button>
                </form>
                <form action="/ihm/add_shape" method="get">
                    <label>Nom Forme <input type="text" name="name" required></label>
                    <label>Matrice Image <input type="text" name="image" required></label>
                    <button type="submit">Ajouter Forme</button>
                </form>
            </section>

            <section>
                <h2>4. Lancer une mission manuellement</h2>
                <form action="/ihm/add_mission" method="get">
                    <label>Sémaphore ID <input type="text" name="semaphore_id" required></label>
                    <label>Shape ID <input type="text" name="shape_id" required></label>
                    <label>Équipe <input type="text" name="team" required></label>
                    <button type="submit">Déclencher</button>
                </form>
            </section>
        </div>

        <div class="col-map">
            <h2>🗺️ Carte en Temps Réel</h2>
            <div id="grid-container" class="waiting-msg">
                En attente de la configuration...
            </div>
            <div class="legend">
                <span>🏠 Base (0,0)</span>
                <span>🚦 Sémaphore</span>
                <span>🤖 Robot</span>
            </div>
        </div>
    </main>

    <script>
        function rafraichirCarte() {
            Promise.all([
                fetch('/api/get_config').then(r => r.json()),
                fetch('/api/list_semaphore').then(r => r.json()),
                fetch('/api/list_robots').then(r => r.json())
            ])
            .then(([config, semaphores, robots]) => {
                if (!config || !config.nombre_x) {
                    document.getElementById('grid-container').innerHTML = "Veuillez d'abord créer la configuration globale (Étape 1).";
                    return;
                }

                let html = '<table class="grid-table">';
                for (let y = 0; y < config.nombre_y; y++) {
                    html += '<tr>';
                    for (let x = 0; x < config.nombre_x; x++) {
                        let classCell = "grid-cell";
                        let icone = "";

                        if (semaphores && semaphores.find(s => s.coord_x == x && s.coord_y == y)) {
                            classCell += " cell-semaphore";
                            icone = "🚦";
                        }
                        
                        if (robots && robots.find(r => r.position_x == x && r.position_y == y)) {
                            classCell += " cell-robot";
                            icone = "🤖";
                        }

                        if (x === 0 && y === 0 && icone === "") {
                            classCell += " cell-base";
                            icone = "🏠";
                        }

                        html += `<td class="${classCell}" title="X:${x}, Y:${y}">${icone}</td>`;
                    }
                    html += '</tr>';
                }
                html += '</table>';
                document.getElementById('grid-container').innerHTML = html;
            })
            .catch(e => console.log("Erreur chargement carte", e));
        }

        setInterval(rafraichirCarte, 1000);
        rafraichirCarte();
    </script>
</body>
</html>
